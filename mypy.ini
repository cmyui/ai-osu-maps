[mypy]
strict = True
enable_error_code = truthy-bool, truthy-iterable, ignore-without-code, unused-awaitable, redundant-expr, possibly-undefined

# Third-party libraries without stubs
[mypy-transformers.*]
ignore_missing_imports = True

[mypy-slider.*]
ignore_missing_imports = True

[mypy-wandb.*]
ignore_missing_imports = True

[mypy-sentence_transformers.*]
ignore_missing_imports = True

[mypy-einops.*]
ignore_missing_imports = True

# Pre-existing untyped modules (TODO: fix incrementally)
[mypy-ai_osu_maps.inference.path_approximator]
ignore_errors = True

[mypy-ai_osu_maps.inference.timing_points_change]
ignore_errors = True

[mypy-ai_osu_maps.inference.slider_path]
ignore_errors = True

[mypy-ai_osu_maps.inference.postprocessor]
ignore_errors = True

[mypy-ai_osu_maps.inference.sampler]
ignore_errors = True

[mypy-ai_osu_maps.data.osu_parser]
ignore_errors = True

[mypy-ai_osu_maps.model.transformer]
ignore_errors = True

[mypy-ai_osu_maps.model.audio_encoder]
ignore_errors = True

[mypy-ai_osu_maps.model.conditioning]
ignore_errors = True

[mypy-ai_osu_maps.model.text_encoder]
ignore_errors = True

[mypy-dataset_pipeline.*]
ignore_errors = True

[mypy-diagnose_tokens]
ignore_errors = True

[mypy-inference]
ignore_errors = True
